<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Administrador</title>
<link rel="stylesheet" href="principal/admin.css">
</head>
<body>

<h1>Panel Administrador</h1>

<button id="btnLogout">
    Cerrar sesión
</button>

<hr>

<h2>Agregar Contenido</h2>

<select id="tipo">
    <option value="video">Video</option>
    <option value="imagen">Imagen</option>
    <option value="audio">Audio</option>
    <option value="texto">Texto</option>
</select>

<br><br>

<input
    type="text"
    id="titulo"
    placeholder="Título">

<br><br>

<input
    type="number"
    id="grado"
    placeholder="Grado">

<br><br>

<input
    type="text"
    id="contenido"
    placeholder="URL o Texto">

<br><br>

<button id="btnGuardar">
    Guardar
</button>

<hr>

<div id="resultado"></div>

<hr>
<hr>

<h2>Buscar Contenido</h2>

<input
    type="text"
    id="buscar"
    placeholder="Buscar por título..."
    list="sugerencias">

<datalist id="sugerencias"></datalist>

<select id="filtroGrado">
    <option value="">Todos los grados</option>
    <option value="1">1°</option>
    <option value="2">2°</option>
    <option value="3">3°</option>
    <option value="4">4°</option>
    <option value="5">5°</option>
</select>

<hr>

<h2>Contenido Registrado</h2>

<div id="listaContenido"></div>


<div id="listaContenido"></div>

<script type="module">

import { db, auth } from "./config-firebase.js";

import {
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const tipo = document.getElementById("tipo");
const titulo = document.getElementById("titulo");
const grado = document.getElementById("grado");
const contenido = document.getElementById("contenido");
const resultado = document.getElementById("resultado");
const listaContenido = document.getElementById("listaContenido");
const buscar = document.getElementById("buscar");
const filtroGrado = document.getElementById("filtroGrado");

let contenidoGlobal = [];

onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location.href = "login.html";

    }

});

document
.getElementById("btnLogout")
.addEventListener("click", async () => {

    await signOut(auth);

});

document
.getElementById("btnGuardar")
.addEventListener("click", async () => {

    try {

        const datos = {

            tipo: tipo.value,
            titulo: titulo.value,
            grado: Number(grado.value)

        };

        if (tipo.value === "texto") {

            datos.texto = contenido.value;

        } else {

            datos.src = contenido.value;

        }

        await addDoc(
            collection(db, "contenido"),
            datos
        );

        resultado.innerHTML =
            "Contenido guardado correctamente";

        titulo.value = "";
        grado.value = "";
        contenido.value = "";

        cargarContenido();

    }
    catch (error) {

        console.error(error);

        resultado.innerHTML =
            error.message;

    }

});

function convertirYoutube(url) {
    return url.replace("watch?v=", "embed/");
}
function cargarSugerencias() {

    const datalist =
        document.getElementById("sugerencias");

    datalist.innerHTML = "";

    const titulos = [
        ...new Set(
            contenidoGlobal
            .map(item => item.titulo)
            .filter(Boolean)
        )
    ];

    titulos.forEach((titulo) => {

        datalist.innerHTML += `
            <option value="${titulo}">
        `;

    });

}

function mostrarContenido() {

    listaContenido.innerHTML = "";

    const textoBusqueda =
        buscar.value.toLowerCase();

    const gradoSeleccionado =
        filtroGrado.value;

    const filtrados =
        contenidoGlobal.filter(item => {

            const coincideTitulo =
                (item.titulo || "")
                .toLowerCase()
                .includes(textoBusqueda);

            const coincideGrado =
                gradoSeleccionado === "" ||
                item.grado ==
                gradoSeleccionado;

            return coincideTitulo &&
                   coincideGrado;

        });

    filtrados.forEach((item) => {

        let mediaHTML = "";

        if (item.tipo === "video") {

            mediaHTML = `
                <iframe width="200" height="120"
                    src="${convertirYoutube(item.src)}"
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            `;

        }

        if (item.tipo === "imagen") {

            mediaHTML = `
                <img src="${item.src}"
                width="200">
            `;

        }

        if (item.tipo === "audio") {

            mediaHTML = `
                <audio controls>
                    <source src="${item.src}"
                    type="audio/mpeg">
                </audio>
            `;

        }

        if (item.tipo === "texto") {

            mediaHTML = `
                <p>${item.texto}</p>
            `;

        }

        listaContenido.innerHTML += `

            <div style="
                border:1px solid gray;
                padding:10px;
                margin:10px;
            ">

                <b>${item.tipo}</b>

                <br>

                ${item.titulo || "Sin título"}

                <br>

                Grado: ${item.grado}

                <br><br>

                ${mediaHTML}

                <br>

                ID: ${item.id}

                <br><br>

                <button onclick="eliminarContenido('${item.id}')">
                    Eliminar
                </button>

            </div>

        `;

    });

}

async function cargarContenido() {

    const querySnapshot = await getDocs(
        collection(db, "contenido")
    );

    contenidoGlobal = [];

    querySnapshot.forEach((documento) => {

        contenidoGlobal.push({
            id: documento.id,
            ...documento.data()
        });

    });

    cargarSugerencias();

    mostrarContenido();

}
window.eliminarContenido = async (id) => {

    const confirmar = confirm(
        "¿Desea eliminar este contenido?"
    );

    if (!confirmar) {

        return;

    }

    try {

        await deleteDoc(
            doc(db, "contenido", id)
        );

        cargarContenido();

    }
    catch (error) {

        console.error(error);

        alert(error.message);

    }

};

cargarContenido();
buscar.addEventListener(
    "input",
    mostrarContenido
);

filtroGrado.addEventListener(
    "change",
    mostrarContenido
);
</script>

</body>
</html>
