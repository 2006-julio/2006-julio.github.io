<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Rayo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="login-box p-4">

        <h3 class="text-center mb-4 titulo"> Iniciar Sesión </h3>

        <form>
            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control input-custom" placeholder="ejemplo@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control input-custom" placeholder="********" required>
            </div>

            <button type="submit" class="btn btn-rayo w-100">Entrar</button>
        </form>

    </div>
</div>

</body>
</html>
